name: Download DermLIP Model to Release

on:
  workflow_dispatch: # اجازه اجرای دستی

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # اجازه ساخت Release
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download Model Files
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          
          model_id = 'redlessone/DermLIP_PanDerm-base-w-PubMed-256'
          
          print(f'Downloading all files from {model_id}...')
          # snapshot_download کل ریپازیتوری را دانلود می‌کند
          path = snapshot_download(
              repo_id=model_id,
              local_dir='./model_files',
              local_dir_use_symlinks=False
          )
          print(f'Successfully downloaded all files to {path}')
          "

      - name: Create Release and Upload Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dermlip-v1.0
          name: "DermLIP PanDerm Model v1.0"
          body: "A dermatology vision-language model (CLIP-style). Contains all model files from Hugging Face."
          files: |
            model_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
