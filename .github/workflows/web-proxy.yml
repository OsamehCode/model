name: Full Proxy Server

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y tinyproxy wget
          
          # پیکربندی tinyproxy
          sudo sed -i 's/^Allow 127.0.0.1/#Allow 127.0.0.1/' /etc/tinyproxy/tinyproxy.conf
          sudo sed -i 's/^Allow ::1/#Allow ::1/' /etc/tinyproxy/tinyproxy.conf
          echo "Allow 0.0.0.0/0" | sudo tee -a /etc/tinyproxy/tinyproxy.conf
          sudo systemctl restart tinyproxy
          
          # نصب cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Create Tunnel
        run: |
          echo "🚀 Starting proxy tunnel..."
          cloudflared tunnel --url http://localhost:8888 2>&1 | tee tunnel.log &
          
          sleep 20
          
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          
          echo "=============================================="
          echo "✅ YOUR PROXY ADDRESS:"
          echo ""
          echo "   🌐 $TUNNEL_URL"
          echo "   📍 Port: 8888"
          echo ""
          echo "   Configure your browser/system with:"
          echo "   HTTP Proxy: $TUNNEL_URL:8888"
          echo ""
          echo "=============================================="
          
          sleep 21600
