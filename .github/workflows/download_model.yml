name: دانلود، تقسیم و کامیت مدل

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: 1. دانلود مدل
        run: python download_model.py

      - name: 2. تقسیم فایل‌های بزرگ و آماده‌سازی برای کامیت
        run: python split_for_commit.py

      - name: 3. کامیت و پوش فایل‌های قطعه‌قطعه
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # پوشه‌ی model_chunks (و نه model_files) را اضافه کن
          git add model_chunks/
          
          # اگر تغییراتی وجود نداشت، خارج شو
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add model chunks"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # این توکن خودکار توسط گیت‌هاب تزریق می‌شود
